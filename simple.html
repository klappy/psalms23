<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Psalm 23 - An Immersive Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #000;
        }
        
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: all 1s ease-in-out;
            overflow: hidden;
        }
        
        /* Pastoral Scene */
        .scene-pastoral {
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 50%, #90EE90 100%);
        }
        
        .scene-pastoral::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 5%, transparent 15%),
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.2) 8%, transparent 18%),
                radial-gradient(circle at 60% 70%, rgba(255,255,255,0.25) 6%, transparent 16%);
            animation: clouds 20s infinite linear;
        }
        
        /* Meadow Scene */
        .scene-meadow {
            background: linear-gradient(135deg, #32CD32 0%, #228B22 50%, #006400 100%);
        }
        
        .scene-meadow::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                rgba(255,255,255,0.1) 2px,
                transparent 4px,
                transparent 8px
            );
            animation: grass-sway 3s ease-in-out infinite;
        }
        
        /* Waters Scene */
        .scene-waters {
            background: linear-gradient(135deg, #4682B4 0%, #1E90FF 50%, #0000CD 100%);
        }
        
        .scene-waters::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: 
                linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 32%, transparent 34%),
                linear-gradient(-45deg, transparent 30%, rgba(255,255,255,0.1) 32%, transparent 34%);
            background-size: 20px 20px;
            animation: water-ripple 4s ease-in-out infinite;
        }
        
        /* Valley Scene */
        .scene-valley {
            background: linear-gradient(135deg, #2F4F4F 0%, #000000 50%, #1C1C1C 100%);
        }
        
        .scene-valley::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            width: 100px;
            height: 300px;
            background: linear-gradient(0deg, transparent 0%, rgba(255,255,0,0.8) 20%, rgba(255,255,255,0.9) 50%, transparent 100%);
            transform: translateX(-50%) skewX(-10deg);
            animation: divine-light 3s ease-in-out infinite;
        }
        
        /* Feast Scene */
        .scene-feast {
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 50%, #FF8C00 100%);
        }
        
        .scene-feast::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 120px;
            background: radial-gradient(ellipse, rgba(255,165,0,0.8) 0%, rgba(255,140,0,0.6) 30%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: candle-flicker 2s ease-in-out infinite;
        }
        
        /* Eternal Scene */
        .scene-eternal {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
        }
        
        .scene-eternal::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.4) 3%, transparent 8%),
                radial-gradient(circle at 75% 35%, rgba(255,255,255,0.3) 4%, transparent 9%),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.5) 2%, transparent 7%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.3) 3%, transparent 8%);
            animation: divine-sparkles 4s ease-in-out infinite;
        }
        
        /* Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: float 6s linear infinite;
        }
        
        .particle:nth-child(odd) {
            animation-delay: -2s;
            animation-duration: 8s;
        }
        
        .particle:nth-child(even) {
            animation-delay: -4s;
            animation-duration: 10s;
        }
        
        /* Content */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 100;
            max-width: 90%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            animation: content-glow 4s ease-in-out infinite;
        }
        
        .verse-title {
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 700;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            animation: title-pulse 3s ease-in-out infinite;
        }
        
        .verse-text {
            font-size: clamp(16px, 3.5vw, 22px);
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
            animation: text-fade 2s ease-in-out;
        }
        
        .verse-reflection {
            font-size: clamp(14px, 2.5vw, 18px);
            line-height: 1.5;
            opacity: 0.9;
            animation: reflection-glow 4s ease-in-out infinite;
        }
        
        /* Navigation */
        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            padding: 15px 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .nav-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 24px;
            padding: 12px 16px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            min-height: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .nav-btn:hover, .nav-btn:active {
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.2));
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255,255,255,0.2);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        
        .verse-indicator {
            font-size: 18px;
            font-weight: 600;
            color: white;
            min-width: 80px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        /* Settings */
        .settings-panel {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
        }
        
        .settings-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 24px;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .settings-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 6px 20px rgba(255,255,255,0.2);
        }
        
        .settings-content {
            position: absolute;
            top: 70px;
            right: 0;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        
        .settings-panel.open .settings-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
            color: white;
            cursor: pointer;
        }
        
        .setting-item:last-child {
            margin-bottom: 0;
        }
        
        .toggle {
            width: 50px;
            height: 25px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toggle.active {
            background: #4CAF50;
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 21px;
            height: 21px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .toggle.active::after {
            transform: translateX(25px);
        }
        
        /* Progress */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            z-index: 999;
            background: rgba(0,0,0,0.3);
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FF8C00);
            width: 16.66%;
            transition: width 1s ease;
            box-shadow: 0 0 15px rgba(255,215,0,0.6);
        }
        
        /* Audio visualization */
        .audio-viz {
            position: fixed;
            bottom: 100px;
            left: 30px;
            display: flex;
            gap: 3px;
            z-index: 1000;
        }
        
        .audio-bar {
            width: 4px;
            height: 20px;
            background: linear-gradient(0deg, #FFD700, #FF8C00);
            border-radius: 2px;
            animation: audio-bounce 1s ease-in-out infinite;
        }
        
        .audio-bar:nth-child(2) { animation-delay: 0.1s; }
        .audio-bar:nth-child(3) { animation-delay: 0.2s; }
        .audio-bar:nth-child(4) { animation-delay: 0.3s; }
        .audio-bar:nth-child(5) { animation-delay: 0.4s; }
        
        /* Animations */
        @keyframes clouds {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        @keyframes grass-sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }
        
        @keyframes water-ripple {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-5px); }
        }
        
        @keyframes divine-light {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) skewX(-10deg) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) skewX(-5deg) scale(1.1); }
        }
        
        @keyframes candle-flicker {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            25% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.7; }
            75% { transform: translate(-50%, -50%) scale(1.02); opacity: 0.85; }
        }
        
        @keyframes divine-sparkles {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        @keyframes float {
            0% { 
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-10vh) translateX(50px);
                opacity: 0;
            }
        }
        
        @keyframes content-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 50px rgba(255,255,255,0.2); }
        }
        
        @keyframes title-pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,215,0,0.5); }
            50% { transform: scale(1.02); text-shadow: 0 0 30px rgba(255,215,0,0.8); }
        }
        
        @keyframes text-fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes reflection-glow {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }
        
        @keyframes audio-bounce {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .nav-controls {
                bottom: 20px;
                padding: 12px 20px;
                gap: 15px;
            }
            
            .nav-btn {
                min-width: 45px;
                min-height: 45px;
                font-size: 20px;
            }
            
            .content {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .settings-content {
                min-width: 200px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <!-- Scene Container -->
    <div class="scene scene-pastoral" id="scene">
        <!-- Particles -->
        <div class="particles" id="particles"></div>
        
        <!-- Content -->
        <div class="content">
            <h1 class="verse-title" id="verse-title">The Lord is my shepherd</h1>
            <p class="verse-text" id="verse-text">The Lord is my shepherd; I shall not want.</p>
            <div class="verse-reflection" id="verse-reflection">In God's care, we find complete provision and peace.</div>
        </div>
    </div>
    
    <!-- Navigation -->
    <nav class="nav-controls">
        <button id="prev-btn" class="nav-btn">‹</button>
        <div class="verse-indicator">
            <span id="current-verse">1</span> / <span id="total-verses">6</span>
        </div>
        <button id="next-btn" class="nav-btn">›</button>
    </nav>
    
    <!-- Settings -->
    <div class="settings-panel" id="settings-panel">
        <button class="settings-btn" id="settings-btn">⚙</button>
        <div class="settings-content">
            <div class="setting-item">
                <span>Audio</span>
                <div class="toggle active" id="audio-toggle"></div>
            </div>
            <div class="setting-item">
                <span>Particles</span>
                <div class="toggle active" id="particles-toggle"></div>
            </div>
            <div class="setting-item">
                <span>Auto-advance</span>
                <div class="toggle active" id="auto-toggle"></div>
            </div>
        </div>
    </div>
    
    <!-- Audio Visualization -->
    <div class="audio-viz" id="audio-viz">
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
        <div class="audio-bar"></div>
    </div>

    <script>
        class ImmersivePsalm23 {
            constructor() {
                this.currentVerse = 0;
                this.autoAdvance = true;
                this.audioEnabled = true;
                this.particlesEnabled = true;
                this.autoTimer = null;
                
                this.verses = [
                    {
                        title: "The Lord is my shepherd",
                        text: "The Lord is my shepherd; I shall not want.",
                        reflection: "In God's care, we find complete provision and peace.",
                        scene: "pastoral",
                        audio: "pastoral"
                    },
                    {
                        title: "Green pastures",
                        text: "He makes me lie down in green pastures.",
                        reflection: "In His presence, we find rest and renewal.",
                        scene: "meadow",
                        audio: "nature"
                    },
                    {
                        title: "Still waters",
                        text: "He leads me beside quiet waters.",
                        reflection: "His guidance brings us to places of peace and refreshment.",
                        scene: "waters",
                        audio: "water"
                    },
                    {
                        title: "Valley of shadows",
                        text: "Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me.",
                        reflection: "In our darkest moments, His presence is our light.",
                        scene: "valley",
                        audio: "valley"
                    },
                    {
                        title: "Prepared table",
                        text: "You prepare a table before me in the presence of my enemies; you anoint my head with oil; my cup overflows.",
                        reflection: "God's abundance surrounds us even in difficult times.",
                        scene: "feast",
                        audio: "feast"
                    },
                    {
                        title: "Eternal dwelling",
                        text: "Surely goodness and mercy shall follow me all the days of my life, and I will dwell in the house of the Lord forever.",
                        reflection: "God's love extends into eternity, our permanent home.",
                        scene: "eternal",
                        audio: "eternal"
                    }
                ];
                
                this.audioContext = null;
                this.sounds = new Map();
                
                this.init();
            }
            
            async init() {
                this.setupUI();
                this.setupAudio();
                this.createParticles();
                this.loadVerse(0);
                this.startAutoAdvance();
                
                // Add some startup effects
                setTimeout(() => {
                    document.body.style.animation = 'none';
                }, 1000);
            }
            
            setupUI() {
                // Navigation
                document.getElementById('prev-btn').addEventListener('click', () => this.previousVerse());
                document.getElementById('next-btn').addEventListener('click', () => this.nextVerse());
                
                // Settings
                document.getElementById('settings-btn').addEventListener('click', () => this.toggleSettings());
                document.getElementById('audio-toggle').addEventListener('click', () => this.toggleAudio());
                document.getElementById('particles-toggle').addEventListener('click', () => this.toggleParticles());
                document.getElementById('auto-toggle').addEventListener('click', () => this.toggleAutoAdvance());
                
                // Touch gestures
                let startX, startY;
                
                document.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                }, { passive: true });
                
                document.addEventListener('touchend', (e) => {
                    if (!startX || !startY) return;
                    
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const diffX = startX - endX;
                    const diffY = startY - endY;
                    
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            this.nextVerse();
                        } else {
                            this.previousVerse();
                        }
                    }
                    
                    startX = startY = null;
                }, { passive: true });
                
                // Click to advance
                document.querySelector('.content').addEventListener('click', () => {
                    this.nextVerse();
                });
                
                // Keyboard
                document.addEventListener('keydown', (e) => {
                    switch (e.key) {
                        case 'ArrowLeft':
                            this.previousVerse();
                            break;
                        case 'ArrowRight':
                        case ' ':
                            e.preventDefault();
                            this.nextVerse();
                            break;
                        case 'Escape':
                            this.toggleSettings();
                            break;
                    }
                });
                
                // Close settings when clicking outside
                document.addEventListener('click', (e) => {
                    const panel = document.getElementById('settings-panel');
                    if (!panel.contains(e.target)) {
                        panel.classList.remove('open');
                    }
                });
            }
            
            async setupAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Create some basic tones for different scenes
                    this.createAudioTones();
                    console.log('Audio system initialized');
                } catch (error) {
                    console.warn('Audio not available:', error);
                    this.audioEnabled = false;
                }
            }
            
            createAudioTones() {
                // Create different ambient tones for each scene
                const tones = {
                    pastoral: { freq: 220, type: 'sine' },
                    nature: { freq: 330, type: 'triangle' },
                    water: { freq: 110, type: 'sine' },
                    valley: { freq: 165, type: 'sawtooth' },
                    feast: { freq: 440, type: 'square' },
                    eternal: { freq: 528, type: 'sine' }
                };
                
                Object.entries(tones).forEach(([name, config]) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.type = config.type;
                    oscillator.frequency.setValueAtTime(config.freq, this.audioContext.currentTime);
                    
                    gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.start();
                    
                    this.sounds.set(name, { oscillator, gainNode });
                });
            }
            
            createParticles() {
                const container = document.getElementById('particles');
                
                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 6 + 's';
                    particle.style.animationDuration = (6 + Math.random() * 4) + 's';
                    container.appendChild(particle);
                }
            }
            
            nextVerse() {
                if (this.currentVerse < this.verses.length - 1) {
                    this.loadVerse(this.currentVerse + 1);
                }
                this.restartAutoAdvance();
            }
            
            previousVerse() {
                if (this.currentVerse > 0) {
                    this.loadVerse(this.currentVerse - 1);
                }
                this.restartAutoAdvance();
            }
            
            loadVerse(index) {
                this.currentVerse = index;
                const verse = this.verses[index];
                
                // Update content with animation
                const content = document.querySelector('.content');
                content.style.opacity = '0';
                content.style.transform = 'translate(-50%, -50%) scale(0.9)';
                
                setTimeout(() => {
                    document.getElementById('verse-title').textContent = verse.title;
                    document.getElementById('verse-text').textContent = verse.text;
                    document.getElementById('verse-reflection').textContent = verse.reflection;
                    
                    content.style.opacity = '1';
                    content.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 200);
                
                // Update scene
                const scene = document.getElementById('scene');
                scene.className = `scene scene-${verse.scene}`;
                
                // Update progress
                document.getElementById('current-verse').textContent = index + 1;
                document.getElementById('total-verses').textContent = this.verses.length;
                
                const progress = ((index + 1) / this.verses.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                
                // Update navigation buttons
                document.getElementById('prev-btn').disabled = index === 0;
                document.getElementById('next-btn').disabled = index === this.verses.length - 1;
                
                // Play audio for scene
                this.playSceneAudio(verse.audio);
            }
            
            playSceneAudio(audioType) {
                if (!this.audioEnabled || !this.audioContext) return;
                
                // Fade out all sounds
                this.sounds.forEach((sound) => {
                    sound.gainNode.gain.linearRampToValueAtTime(0, this.audioContext.currentTime + 0.5);
                });
                
                // Fade in current scene sound
                const currentSound = this.sounds.get(audioType);
                if (currentSound) {
                    currentSound.gainNode.gain.linearRampToValueAtTime(0.1, this.audioContext.currentTime + 1);
                }
            }
            
            toggleSettings() {
                document.getElementById('settings-panel').classList.toggle('open');
            }
            
            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                const toggle = document.getElementById('audio-toggle');
                toggle.classList.toggle('active', this.audioEnabled);
                
                const viz = document.getElementById('audio-viz');
                viz.style.display = this.audioEnabled ? 'flex' : 'none';
                
                if (!this.audioEnabled) {
                    this.sounds.forEach((sound) => {
                        sound.gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
                    });
                } else {
                    this.playSceneAudio(this.verses[this.currentVerse].audio);
                }
            }
            
            toggleParticles() {
                this.particlesEnabled = !this.particlesEnabled;
                const toggle = document.getElementById('particles-toggle');
                toggle.classList.toggle('active', this.particlesEnabled);
                
                const particles = document.getElementById('particles');
                particles.style.display = this.particlesEnabled ? 'block' : 'none';
            }
            
            toggleAutoAdvance() {
                this.autoAdvance = !this.autoAdvance;
                const toggle = document.getElementById('auto-toggle');
                toggle.classList.toggle('active', this.autoAdvance);
                
                if (this.autoAdvance) {
                    this.startAutoAdvance();
                } else {
                    this.stopAutoAdvance();
                }
            }
            
            startAutoAdvance() {
                if (!this.autoAdvance) return;
                this.autoTimer = setTimeout(() => {
                    this.nextVerse();
                }, 10000); // 10 seconds per verse
            }
            
            stopAutoAdvance() {
                if (this.autoTimer) {
                    clearTimeout(this.autoTimer);
                    this.autoTimer = null;
                }
            }
            
            restartAutoAdvance() {
                this.stopAutoAdvance();
                if (this.autoAdvance) {
                    this.startAutoAdvance();
                }
            }
        }
        
        // Start the immersive experience
        document.addEventListener('DOMContentLoaded', () => {
            // Wait for user interaction on mobile
            const start = () => {
                new ImmersivePsalm23();
                document.removeEventListener('click', start);
                document.removeEventListener('touchstart', start);
            };
            
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                document.addEventListener('click', start);
                document.addEventListener('touchstart', start);
                
                // Show tap instruction
                const instruction = document.createElement('div');
                instruction.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0,0,0,0.8);
                    color: white;
                    padding: 30px;
                    border-radius: 15px;
                    text-align: center;
                    z-index: 10000;
                    font-size: 18px;
                    border: 2px solid rgba(255,255,255,0.3);
                    backdrop-filter: blur(20px);
                `;
                instruction.innerHTML = `
                    <h3 style="margin-bottom: 15px; color: #FFD700;">🎭 Psalm 23 Journey</h3>
                    <p>Tap anywhere to begin your immersive experience</p>
                `;
                document.body.appendChild(instruction);
                
                document.addEventListener('click', () => {
                    if (instruction.parentNode) {
                        instruction.parentNode.removeChild(instruction);
                    }
                });
            } else {
                start();
            }
        });
    </script>
</body>
</html>
