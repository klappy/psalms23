<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Psalm 23 - Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .content {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            animation: fadeIn 1s ease;
        }
        
        .verse-title {
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 600;
            margin-bottom: 20px;
            color: #f39c12;
        }
        
        .verse-text {
            font-size: clamp(18px, 3vw, 24px);
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        .verse-reflection {
            font-size: clamp(14px, 2.5vw, 16px);
            line-height: 1.5;
            opacity: 0.8;
        }
        
        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-btn:hover, .nav-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .verse-indicator {
            font-size: 16px;
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }
        
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 16.66%;
            transition: width 0.8s ease;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
        
        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .nav-controls {
                bottom: 20px;
                padding: 12px 20px;
                gap: 15px;
            }
            
            .nav-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
            
            .content {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="status" id="status">Loading...</div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <div class="container">
        <div class="content">
            <h1 class="verse-title" id="verse-title">The Lord is my shepherd</h1>
            <p class="verse-text" id="verse-text">The Lord is my shepherd; I shall not want.</p>
            <div class="verse-reflection" id="verse-reflection">In God's care, we find complete provision and peace.</div>
        </div>
    </div>
    
    <nav class="nav-controls">
        <button id="prev-btn" class="nav-btn">‹</button>
        <div class="verse-indicator">
            <span id="current-verse">1</span> / <span id="total-verses">6</span>
        </div>
        <button id="next-btn" class="nav-btn">›</button>
    </nav>

    <script>
        class TestApp {
            constructor() {
                this.currentVerse = 0;
                this.verses = [
                    {
                        title: "The Lord is my shepherd",
                        text: "The Lord is my shepherd; I shall not want.",
                        reflection: "In God's care, we find complete provision and peace.",
                        background: "linear-gradient(135deg, #4a9b8e 0%, #6eb5a6 100%)"
                    },
                    {
                        title: "Green pastures",
                        text: "He makes me lie down in green pastures.",
                        reflection: "In His presence, we find rest and renewal.",
                        background: "linear-gradient(135deg, #27ae60 0%, #2ecc71 100%)"
                    },
                    {
                        title: "Still waters",
                        text: "He leads me beside quiet waters.",
                        reflection: "His guidance brings us to places of peace and refreshment.",
                        background: "linear-gradient(135deg, #2980b9 0%, #3498db 100%)"
                    },
                    {
                        title: "Valley of shadows",
                        text: "Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me.",
                        reflection: "In our darkest moments, His presence is our light.",
                        background: "linear-gradient(135deg, #34495e 0%, #2c3e50 100%)"
                    },
                    {
                        title: "Prepared table",
                        text: "You prepare a table before me in the presence of my enemies; you anoint my head with oil; my cup overflows.",
                        reflection: "God's abundance surrounds us even in difficult times.",
                        background: "linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%)"
                    },
                    {
                        title: "Eternal dwelling",
                        text: "Surely goodness and mercy shall follow me all the days of my life, and I will dwell in the house of the Lord forever.",
                        reflection: "God's love extends into eternity, our permanent home.",
                        background: "linear-gradient(135deg, #e67e22 0%, #f39c12 100%)"
                    }
                ];
                
                this.init();
            }
            
            init() {
                this.updateStatus('Initializing...');
                this.setupUI();
                this.loadVerse(0);
                this.updateStatus('Ready - Test mode active');
            }
            
            updateStatus(message) {
                document.getElementById('status').textContent = message;
            }
            
            setupUI() {
                // Navigation
                document.getElementById('prev-btn').addEventListener('click', () => this.previousVerse());
                document.getElementById('next-btn').addEventListener('click', () => this.nextVerse());
                
                // Touch gestures
                let startX, startY;
                
                document.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                }, { passive: true });
                
                document.addEventListener('touchend', (e) => {
                    if (!startX || !startY) return;
                    
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const diffX = startX - endX;
                    const diffY = startY - endY;
                    
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            this.nextVerse();
                        } else {
                            this.previousVerse();
                        }
                    }
                    
                    startX = startY = null;
                }, { passive: true });
                
                // Click to advance
                document.querySelector('.content').addEventListener('click', () => {
                    this.nextVerse();
                });
                
                // Keyboard
                document.addEventListener('keydown', (e) => {
                    switch (e.key) {
                        case 'ArrowLeft':
                            this.previousVerse();
                            break;
                        case 'ArrowRight':
                        case ' ':
                            e.preventDefault();
                            this.nextVerse();
                            break;
                    }
                });
            }
            
            nextVerse() {
                if (this.currentVerse < this.verses.length - 1) {
                    this.loadVerse(this.currentVerse + 1);
                }
            }
            
            previousVerse() {
                if (this.currentVerse > 0) {
                    this.loadVerse(this.currentVerse - 1);
                }
            }
            
            loadVerse(index) {
                this.currentVerse = index;
                const verse = this.verses[index];
                
                // Update content
                document.getElementById('verse-title').textContent = verse.title;
                document.getElementById('verse-text').textContent = verse.text;
                document.getElementById('verse-reflection').textContent = verse.reflection;
                
                // Update background
                document.body.style.background = verse.background;
                
                // Update progress
                document.getElementById('current-verse').textContent = index + 1;
                document.getElementById('total-verses').textContent = this.verses.length;
                
                const progress = ((index + 1) / this.verses.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                
                // Update navigation buttons
                document.getElementById('prev-btn').disabled = index === 0;
                document.getElementById('next-btn').disabled = index === this.verses.length - 1;
                
                this.updateStatus(`Verse ${index + 1} loaded successfully`);
            }
        }
        
        // Start the test app
        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.testApp = new TestApp();
            } catch (error) {
                document.getElementById('status').textContent = 'Error: ' + error.message;
                console.error('Test app failed:', error);
            }
        });
        
        // Error handling
        window.addEventListener('error', (e) => {
            document.getElementById('status').textContent = 'Error: ' + e.error.message;
            console.error('Global error:', e.error);
        });
    </script>
</body>
</html>
