<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 3: Living Diorama - Interactive Scenes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            touch-action: pan-x;
        }

        .diorama-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            transition: transform 0.6s ease;
        }

        .scene-diorama {
            width: 100vw;
            height: 100vh;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .interactive-element {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .interactive-element:hover {
            transform: scale(1.1);
            opacity: 1;
        }

        .interactive-element.activated {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .verse-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 80%;
            text-align: center;
            z-index: 1000;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8);
            transition: all 0.4s ease;
        }

        .verse-popup.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .verse-popup h3 {
            color: #2d3748;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .verse-popup p {
            color: #4a5568;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Scene 1: The Shepherd */
        .scene-1 {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
        }

        .scene-1 .sheep {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .scene-1 .shepherd {
            font-size: 3rem;
            top: 30%;
            left: 60%;
        }

        .scene-1 .hill {
            font-size: 4rem;
            bottom: 20%;
            left: 10%;
        }

        /* Scene 2: Green Pastures */
        .scene-2 {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        }

        .scene-2 .grass {
            font-size: 2rem;
            animation: sway 2s ease-in-out infinite;
        }

        .scene-2 .flower {
            font-size: 1.5rem;
            animation: bloom 4s ease-in-out infinite;
        }

        .scene-2 .tree {
            font-size: 3rem;
            top: 20%;
            right: 20%;
        }

        /* Scene 3: Still Waters */
        .scene-3 {
            background: linear-gradient(135deg, #0984e3 0%, #74b9ff 100%);
        }

        .scene-3 .water {
            font-size: 2rem;
            animation: ripple 3s ease-in-out infinite;
        }

        .scene-3 .reflection {
            font-size: 1.5rem;
            opacity: 0.6;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        @keyframes bloom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes ripple {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .navigation {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: white;
            transform: scale(1.2);
        }

        .scene-title {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 50;
        }

        .instructions {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .swipe-hint {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            color: white;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            font-size: 0.9rem;
            opacity: 0.7;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 768px) {
            .scene-title {
                font-size: 1.5rem;
            }
            
            .interactive-element {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="instructions">
        <h4>Living Diorama</h4>
        <p>Tap elements to explore • Swipe to navigate</p>
    </div>

    <div class="swipe-hint">← Swipe to explore →</div>

    <div class="diorama-container" id="container">
        <!-- Scene 1: The Shepherd -->
        <div class="scene-diorama scene-1">
            <div class="scene-title">The Shepherd</div>
            <div class="interactive-element shepherd" style="top: 30%; left: 60%;">🧙‍♂️</div>
            <div class="interactive-element sheep" style="top: 60%; left: 20%;">🐑</div>
            <div class="interactive-element sheep" style="top: 70%; left: 40%;">🐑</div>
            <div class="interactive-element sheep" style="top: 65%; left: 70%;">🐑</div>
            <div class="interactive-element hill" style="bottom: 20%; left: 10%;">⛰️</div>
            <div class="interactive-element sun" style="top: 10%; right: 10%;">☀️</div>
        </div>

        <!-- Scene 2: Green Pastures -->
        <div class="scene-diorama scene-2">
            <div class="scene-title">Green Pastures</div>
            <div class="interactive-element grass" style="bottom: 10%; left: 20%;">🌾</div>
            <div class="interactive-element grass" style="bottom: 15%; left: 50%;">🌾</div>
            <div class="interactive-element grass" style="bottom: 20%; left: 80%;">🌾</div>
            <div class="interactive-element flower" style="bottom: 30%; left: 30%;">🌸</div>
            <div class="interactive-element flower" style="bottom: 35%; left: 60%;">🌺</div>
            <div class="interactive-element flower" style="bottom: 25%; left: 75%;">🌻</div>
            <div class="interactive-element tree" style="top: 20%; right: 20%;">🌳</div>
            <div class="interactive-element butterfly" style="top: 40%; left: 40%;">🦋</div>
        </div>

        <!-- Scene 3: Still Waters -->
        <div class="scene-diorama scene-3">
            <div class="scene-title">Still Waters</div>
            <div class="interactive-element water" style="bottom: 30%; left: 30%;">💧</div>
            <div class="interactive-element water" style="bottom: 25%; left: 50%;">💧</div>
            <div class="interactive-element water" style="bottom: 35%; left: 70%;">💧</div>
            <div class="interactive-element reflection" style="bottom: 40%; left: 45%;">✨</div>
            <div class="interactive-element reflection" style="bottom: 45%; left: 65%;">✨</div>
            <div class="interactive-element moon" style="top: 20%; left: 20%;">🌙</div>
            <div class="interactive-element star" style="top: 15%; left: 70%;">⭐</div>
            <div class="interactive-element star" style="top: 25%; left: 80%;">⭐</div>
        </div>
    </div>

    <div class="navigation">
        <div class="nav-dot active" onclick="goToScene(0)"></div>
        <div class="nav-dot" onclick="goToScene(1)"></div>
        <div class="nav-dot" onclick="goToScene(2)"></div>
        <div class="nav-dot" onclick="goToScene(3)"></div>
        <div class="nav-dot" onclick="goToScene(4)"></div>
        <div class="nav-dot" onclick="goToScene(5)"></div>
        <div class="nav-dot" onclick="goToScene(6)"></div>
        <div class="nav-dot" onclick="goToScene(7)"></div>
    </div>

    <div class="verse-popup" id="popup">
        <h3 id="popup-title">Verse Title</h3>
        <p id="popup-text">Verse text will appear here...</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>

    <script>
        let currentScene = 0;
        const container = document.getElementById('container');
        const popup = document.getElementById('popup');
        const popupTitle = document.getElementById('popup-title');
        const popupText = document.getElementById('popup-text');

        const verses = {
            'shepherd': {
                title: 'The Shepherd',
                text: 'The LORD is my shepherd; I shall not want.'
            },
            'sheep': {
                title: 'His Flock',
                text: 'We are the sheep of his pasture, guided by his loving care.'
            },
            'grass': {
                title: 'Green Pastures',
                text: 'He makes me lie down in green pastures.'
            },
            'flower': {
                title: 'Beauty of Creation',
                text: 'He has made everything beautiful in its time.'
            },
            'water': {
                title: 'Still Waters',
                text: 'He leads me beside still waters. He restores my soul.'
            },
            'reflection': {
                title: 'Reflection',
                text: 'In the quiet moments, we find peace and restoration.'
            }
        };

        function goToScene(sceneIndex) {
            currentScene = sceneIndex;
            container.style.transform = `translateX(-${sceneIndex * 100}vw)`;
            
            // Update navigation dots
            document.querySelectorAll('.nav-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === sceneIndex);
            });
        }

        function showPopup(elementType) {
            const verse = verses[elementType];
            if (verse) {
                popupTitle.textContent = verse.title;
                popupText.textContent = verse.text;
                popup.classList.add('active');
            }
        }

        function closePopup() {
            popup.classList.remove('active');
        }

        // Add click handlers to interactive elements
        document.querySelectorAll('.interactive-element').forEach(element => {
            element.addEventListener('click', (e) => {
                const elementType = e.target.classList[1]; // Get the second class (element type)
                element.classList.add('activated');
                showPopup(elementType);
                
                // Remove activated class after animation
                setTimeout(() => {
                    element.classList.remove('activated');
                }, 2000);
            });
        });

        // Touch/swipe functionality
        let startX = 0;
        let startY = 0;
        let isDragging = false;

        container.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDragging = true;
        });

        container.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
        });

        container.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const deltaX = endX - startX;
            const deltaY = endY - startY;
            
            // Check if it's a horizontal swipe
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX > 0 && currentScene > 0) {
                    goToScene(currentScene - 1);
                } else if (deltaX < 0 && currentScene < 7) {
                    goToScene(currentScene + 1);
                }
            }
            
            isDragging = false;
        });

        // Close popup when clicking outside
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                closePopup();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentScene > 0) {
                goToScene(currentScene - 1);
            } else if (e.key === 'ArrowRight' && currentScene < 7) {
                goToScene(currentScene + 1);
            } else if (e.key === 'Escape') {
                closePopup();
            }
        });
    </script>
</body>
</html>
