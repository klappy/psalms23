<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 1: The Shepherd's Journey - Linear Parallax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .scene {
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-layer {
            position: absolute;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            will-change: transform;
        }

        .layer-1 { z-index: 1; }
        .layer-2 { z-index: 2; }
        .layer-3 { z-index: 3; }
        .layer-4 { z-index: 4; }
        .layer-5 { z-index: 5; }

        .verse-text {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 80%;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .verse-text h2 {
            color: #2d3748;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .verse-text p {
            color: #4a5568;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
        }

        /* Scene 1: The Shepherd */
        .scene-1 {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
        }
        .scene-1 .layer-1 {
            background: linear-gradient(to bottom, #87ceeb 0%, #98d8e8 100%);
        }
        .scene-1 .layer-2 {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200"><path d="M0,100 Q300,50 600,100 T1200,100 L1200,200 L0,200 Z" fill="%23654321"/></svg>');
            background-size: cover;
            background-repeat: no-repeat;
        }
        .scene-1 .layer-3 {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300"><path d="M0,150 Q400,100 800,150 T1200,150 L1200,300 L0,300 Z" fill="%23228B22"/></svg>');
            background-size: cover;
            background-repeat: no-repeat;
        }

        /* Scene 2: Green Pastures */
        .scene-2 {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        }
        .scene-2 .layer-1 {
            background: linear-gradient(to bottom, #74b9ff 0%, #0984e3 100%);
        }
        .scene-2 .layer-2 {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400"><circle cx="200" cy="200" r="80" fill="%23ffffff" opacity="0.8"/><circle cx="800" cy="150" r="60" fill="%23ffffff" opacity="0.6"/><circle cx="1000" cy="250" r="90" fill="%23ffffff" opacity="0.7"/></svg>');
        }
        .scene-2 .layer-3 {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300"><ellipse cx="300" cy="200" rx="40" ry="20" fill="%23ffffff"/><ellipse cx="700" cy="180" rx="35" ry="18" fill="%23ffffff"/><ellipse cx="900" cy="220" rx="45" ry="22" fill="%23ffffff"/></svg>');
        }

        /* Scene 3: Still Waters */
        .scene-3 {
            background: linear-gradient(135deg, #0984e3 0%, #74b9ff 100%);
        }
        .scene-3 .layer-1 {
            background: linear-gradient(to bottom, #a29bfe 0%, #6c5ce7 100%);
        }
        .scene-3 .layer-2 {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400"><path d="M0,200 Q600,150 1200,200 L1200,400 L0,400 Z" fill="%23002b5c" opacity="0.8"/></svg>');
        }

        .scroll-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: white;
            font-size: 0.9rem;
            text-align: center;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        .scene-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .verse-text {
                max-width: 90%;
                padding: 1.5rem;
            }
            
            .verse-text h2 {
                font-size: 1.2rem;
            }
            
            .verse-text p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="scene-counter">Scene <span id="current-scene">1</span> of 8</div>
    
    <div class="scroll-indicator">
        <div>↓</div>
        <div>Scroll to continue the journey</div>
    </div>

    <!-- Scene 1: The Shepherd -->
    <div class="scene scene-1" data-scene="1">
        <div class="parallax-layer layer-1"></div>
        <div class="parallax-layer layer-2"></div>
        <div class="parallax-layer layer-3"></div>
        <div class="verse-text">
            <h2>The Shepherd</h2>
            <p>"The LORD is my shepherd; I shall not want."</p>
        </div>
    </div>

    <!-- Scene 2: Green Pastures -->
    <div class="scene scene-2" data-scene="2">
        <div class="parallax-layer layer-1"></div>
        <div class="parallax-layer layer-2"></div>
        <div class="parallax-layer layer-3"></div>
        <div class="verse-text">
            <h2>Green Pastures</h2>
            <p>"He makes me lie down in green pastures."</p>
        </div>
    </div>

    <!-- Scene 3: Still Waters -->
    <div class="scene scene-3" data-scene="3">
        <div class="parallax-layer layer-1"></div>
        <div class="parallax-layer layer-2"></div>
        <div class="verse-text">
            <h2>Still Waters</h2>
            <p>"He leads me beside still waters. He restores my soul."</p>
        </div>
    </div>

    <!-- Additional scenes would continue here... -->
    
    <script>
        // Simple parallax effect
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const scenes = document.querySelectorAll('.scene');
            const sceneHeight = window.innerHeight;
            
            scenes.forEach((scene, index) => {
                const sceneTop = index * sceneHeight;
                const relativePos = scrolled - sceneTop;
                const layers = scene.querySelectorAll('.parallax-layer');
                
                // Update scene counter
                if (relativePos >= -sceneHeight/2 && relativePos <= sceneHeight/2) {
                    document.getElementById('current-scene').textContent = index + 1;
                }
                
                layers.forEach((layer, layerIndex) => {
                    const speed = (layerIndex + 1) * 0.5;
                    const yPos = relativePos * speed;
                    layer.style.transform = `translateY(${yPos}px)`;
                });
            });
        });

        // Hide scroll indicator after first scroll
        let hasScrolled = false;
        window.addEventListener('scroll', () => {
            if (!hasScrolled) {
                document.querySelector('.scroll-indicator').style.opacity = '0';
                hasScrolled = true;
            }
        });
    </script>
</body>
</html>
